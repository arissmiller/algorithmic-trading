name: Deploy to Railway

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy to production (branch, tag, or SHA)
        required: true
        default: main
      confirm_production:
        description: Type DEPLOY_PRODUCTION to continue
        required: true

permissions:
  contents: read

concurrency:
  group: railway-deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-production-request:
    name: Validate production request
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm production deployment intent
        run: |
          if [ "${{ github.event.inputs.confirm_production }}" != "DEPLOY_PRODUCTION" ]; then
            echo "Invalid confirmation value. Type DEPLOY_PRODUCTION to proceed."
            exit 1
          fi

  deploy-production:
    name: Deploy production (${{ matrix.service }})
    if: github.event_name == 'workflow_dispatch'
    needs: validate-production-request
    environment: production
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            path: frontend
          - service: data-service
            path: data-service
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway production
        run: railway up --service ${{ matrix.service }} --environment production --path-as-root --detach ${{ matrix.path }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
